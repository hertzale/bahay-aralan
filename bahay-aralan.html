.btn-primary:hover{background:#0f766e;transform:translateY(-1px)}
.btn-secondary{background:white;color:#0d9488;padding:10px 22px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;border:1.5px solid #0d9488;transition:all 0.18s ease;font-family:'DM Sans',sans-serif}

.label{font-size:13px;font-weight:500;color:#64748b;margin-bottom:5px;display:block}

::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.status-paid{background:#dcfce7;color:#16a34a}

const Badge = ({ status }) => {

    paid:"status-paid",unpaid:"status-unpaid",pending:"status-pending",
    verified:"status-verified","in-progress":"status-in-progress",
    resolved:"status-resolved",rejected:"status-rejected",approved:"status-approved",
    high:"status-unpaid",moderate:"status-pending",low:"status-paid",
  };
  return (
    <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-600 ${map[status]||"bg-gray-100 text-gray-600"}`}>
      {status?.replace("-"," ")}

  );
};

const StatCard = ({ icon, label, value, sub, color="teal", onClick }) => {
  const bg = {teal:"bg-teal-50",amber:"bg-amber-50",red:"bg-red-50",blue:"bg-blue-50",green:"bg-green-50",purple:"bg-purple-50"}[color]||"bg-teal-50";

  return (
    <div className={`card p-5 cursor-pointer select-none ${onClick?"hover:border-teal-300 border-2 border-transparent":""}`} onClick={onClick}>
      <div className="flex items-start justify-between">
        <div>
          <p className="text-sm text-slate-500 font-500 mb-1">{label}</p>
          <p className="text-3xl font-display font-700 text-slate-800">{value}</p>

        </div>
        <div className={`w-11 h-11 ${bg} ${ic} rounded-xl flex items-center justify-center`}>
          <I name={icon} size={20} />
        </div>
      </div>
    </div>
  );
};

const DormSearchPage = ({ navigate, setSelectedDorm }) => {
  const [search,setSearch]=useState("");
  const [maxPrice,setMaxPrice]=useState(10000);
  const [selAmenities,setSelAmenities]=useState([]);
  const [showFilter,setShowFilter]=useState(false);
  const allAmenities=["WiFi","AC","CCTV","Laundry","Study Room","Kitchen","Gym","Parking"];
  const togAm = a => setSelAmenities(v=>v.includes(a)?v.filter(x=>x!==a):[...v,a]);
  const filtered = DORMS.filter(d=>{
    const matchSearch=d.name.toLowerCase().includes(search.toLowerCase())||d.address.toLowerCase().includes(search.toLowerCase());
    const matchPrice=d.price<=maxPrice;
    const matchAm=selAmenities.length===0||selAmenities.every(a=>d.amenities.includes(a));
    return matchSearch&&matchPrice&&matchAm;
  });
  return (
    <div>
      <PageHeader title="Find a Dorm" subtitle={`${filtered.length} dorms available`}/>
      <div className="flex gap-3 mb-4">
        <div className="relative flex-1">
          <I name="search" size={17} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or location…" className="input pl-10"/>
        </div>
        <button onClick={()=>setShowFilter(v=>!v)} className={`btn-secondary flex items-center gap-2 ${showFilter?"bg-teal-50":""}`}>
          <I name="filter" size={16}/>Filters
        </button>
      </div>
      {showFilter&&(
        <div className="card p-5 mb-4">
          <div className="grid md:grid-cols-2 gap-6">
            <div>
              <label className="label mb-2">Max Price: <strong className="text-teal-600">₱{maxPrice.toLocaleString()}/mo</strong></label>
              <input type="range" min={1000} max={8000} step={100} value={maxPrice} onChange={e=>setMaxPrice(+e.target.value)} className="w-full accent-teal-600"/>
              <div className="flex justify-between text-xs text-slate-400 mt-1"><span>₱1,000</span><span>₱8,000</span></div>
            </div>
            <div>
              <label className="label mb-2">Amenities</label>
              <div className="flex flex-wrap gap-2">
                {allAmenities.map(a=>(
                  <button key={a} onClick={()=>togAm(a)} className={`text-xs px-3 py-1.5 rounded-full border font-500 transition-all ${selAmenities.includes(a)?"bg-teal-600 text-white border-teal-600":"bg-white text-slate-600 border-slate-200 hover:border-teal-400"}`}>{a}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
      {filtered.length===0
        ? <div className="card p-12 text-center text-slate-400"><I name="search" size={40} className="mx-auto mb-3 opacity-30"/><p>No dorms match your search.</p></div>
        : <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
            {filtered.map(d=>(
              <div key={d.id} className="card overflow-hidden cursor-pointer" onClick={()=>{setSelectedDorm(d);navigate("s-detail");}}>
                <div className="dorm-img flex flex-col items-center justify-center m-3 mb-0 rounded-xl" style={{background:`linear-gradient(135deg,${d.color}88,${d.color})`}}>
                  <I name="building" size={36} className="text-white/60"/>
                  <span className="text-white/80 text-xs mt-1">{d.slots-d.occupied} slots left</span>
                </div>
                <div className="p-4">
                  <div className="flex items-start justify-between mb-1">
                    <h4 className="font-display font-600 text-slate-800 text-base">{d.name}</h4>
                    <div className="flex items-center gap-1 text-amber-500 text-xs font-600 shrink-0 ml-2">
                      <I name="star" size={13}/>{d.rating}
                    </div>
                  </div>
                  <div className="flex items-center gap-1 text-slate-400 text-xs mb-3">
                    <I name="pin" size={13}/>{d.address}
                  </div>
                  <div className="flex flex-wrap gap-1 mb-3">
                    {d.amenities.slice(0,4).map(a=><span key={a} className="bg-slate-100 text-slate-500 text-xs px-2 py-0.5 rounded-full">{a}</span>)}
                    {d.amenities.length>4&&<span className="text-slate-400 text-xs px-1">+{d.amenities.length-4}</span>}
                  </div>
                  <div className="flex items-center justify-between">
                    <span className="font-display font-700 text-teal-600 text-lg">₱{d.price.toLocaleString()}<span className="text-xs text-slate-400 font-400">/mo</span></span>
                    <button className="btn-primary btn-sm">View Details</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
      }
    </div>
  );
};

const StudentPaymentsPage = () => {
  const [form,setForm]=useState({month:"",amount:"",ref:"",file:null});
  const [errors,setErrors]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const f = k => e => setForm(v=>({...v,[k]:e.target.value}));
  const validate = () => {
    const e={};
    if(!form.month) e.month="Select a month";
    if(!form.amount||isNaN(form.amount)) e.amount="Enter valid amount";
    if(!form.ref) e.ref="GCash reference required";
    return e;
  };
  const submit = () => {
    const e=validate();
    if(Object.keys(e).length){setErrors(e);return;}
    setSubmitted(true); setForm({month:"",amount:"",ref:"",file:null});
    setTimeout(()=>setSubmitted(false),4000);
  };
  return (
    <div>
      <PageHeader title="Payments" subtitle="Submit your monthly rent and view payment history"/>
      {submitted&&<div className="bg-green-50 border border-green-200 rounded-xl p-4 mb-5 flex items-center gap-3 text-green-700"><I name="check" size={18}/>Payment submitted! The caretaker will verify it shortly.</div>}
      <div className="grid md:grid-cols-5 gap-5">
        <div className="md:col-span-2 card p-5">
          <h3 className="font-display font-600 text-slate-700 mb-4">Submit Payment</h3>
          <div className="space-y-4">
            <div>
              <label className="label">Billing Month<span className="text-red-400 ml-0.5">*</span></label>
              <select value={form.month} onChange={f("month")} className={`input ${errors.month?"error":""}`}>
                <option value="">Select month...</option>
                {["June 2025","July 2025","August 2025"].map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              {errors.month&&<p className="text-red-500 text-xs mt-1">{errors.month}</p>}
            </div>
            <Input label="Amount (₱)" type="number" value={form.amount} onChange={f("amount")} placeholder="3500" error={errors.amount} required/>
            <Input label="GCash Reference No." value={form.ref} onChange={f("ref")} placeholder="GC-XXXXXXXX" error={errors.ref} required/>
            <div>
              <label className="label">Proof of Payment</label>
              <label className="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-xl p-6 cursor-pointer hover:border-teal-400 hover:bg-teal-50 transition-all">
                <I name="upload" size={24} className="text-slate-300 mb-2"/>
                <span className="text-xs text-slate-400">{form.file?"File selected":"Click to upload screenshot"}</span>
                <input type="file" accept="image/*" className="hidden" onChange={e=>setForm(v=>({...v,file:e.target.files[0]}))}/>
              </label>
            </div>
            <button className="btn-primary w-full" onClick={submit}>Submit Payment</button>
          </div>
        </div>
        <div className="md:col-span-3 card p-5">
          <h3 className="font-display font-600 text-slate-700 mb-4">Payment History</h3>
          <Table headers={["Month","Amount","Reference","Date","Status"]}
            rows={MY_PAYMENTS.map(p=>[p.month,`₱${p.amount.toLocaleString()}`,p.ref,p.date,<Badge status={p.status}/>])}/>
        </div>
      </div>
    </div>
  );
};

const StudentMaintenancePage = () => {
  const [form,setForm]=useState({type:"",issue:"",desc:"",file:null});
  const [errors,setErrors]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const f = k => e => setForm(v=>({...v,[k]:e.target.value}));
  const validate = () => {
    const e={};
    if(!form.type) e.type="Select issue type";
    if(!form.issue.trim()) e.issue="Issue title required";
    if(!form.desc.trim()) e.desc="Please describe the issue";
    return e;
  };
  const submit = () => {
    const e=validate();
    if(Object.keys(e).length){setErrors(e);return;}
    setSubmitted(true);setForm({type:"",issue:"",desc:"",file:null});
    setTimeout(()=>setSubmitted(false),4000);
  };
  return (
    <div>
      <PageHeader title="Maintenance" subtitle="Report issues and track your maintenance requests"/>
      {submitted&&<div className="bg-green-50 border border-green-200 rounded-xl p-4 mb-5 flex items-center gap-3 text-green-700"><I name="check" size={18}/>Request submitted! You'll be notified when it's assigned.</div>}
      <div className="grid md:grid-cols-5 gap-5">
        <div className="md:col-span-2 card p-5">
          <h3 className="font-display font-600 text-slate-700 mb-4">New Request</h3>
          <div className="space-y-4">
            <div>
              <label className="label">Issue Type<span className="text-red-400 ml-0.5">*</span></label>
              <select value={form.type} onChange={f("type")} className={`input ${errors.type?"error":""}`}>
                <option value="">Select type...</option>
                {["Plumbing","Electrical","HVAC","Furniture","Pest Control","Other"].map(t=><option key={t}>{t}</option>)}
              </select>
              {errors.type&&<p className="text-red-500 text-xs mt-1">{errors.type}</p>}
            </div>
            <Input label="Issue Title" value={form.issue} onChange={f("issue")} placeholder="e.g. Broken faucet" error={errors.issue} required/>
            <div>
              <label className="label">Description<span className="text-red-400 ml-0.5">*</span></label>
              <textarea value={form.desc} onChange={f("desc")} placeholder="Describe the issue in detail…" rows={4} className={`input resize-none ${errors.desc?"error":""}`}/>
              {errors.desc&&<p className="text-red-500 text-xs mt-1">{errors.desc}</p>}
            </div>
            <div>
              <label className="label">Photo (optional)</label>
              <label className="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-xl p-5 cursor-pointer hover:border-teal-400 hover:bg-teal-50 transition-all">
                <I name="upload" size={22} className="text-slate-300 mb-2"/>
                <span className="text-xs text-slate-400">{form.file?"Photo selected":"Click to upload photo"}</span>
                <input type="file" accept="image/*" className="hidden" onChange={e=>setForm(v=>({...v,file:e.target.files[0]}))}/>
              </label>
            </div>
            <button className="btn-primary w-full" onClick={submit}>Submit Request</button>
          </div>
        </div>
        <div className="md:col-span-3 card p-5">
          <h3 className="font-display font-600 text-slate-700 mb-4">My Requests</h3>
          <div className="space-y-3">
            {MY_MAINTENANCE.map(m=>(
              <div key={m.id} className="border border-slate-100 rounded-xl p-4">
                <div className="flex items-start justify-between mb-1">
                  <div>
                    <p className="font-600 text-slate-700 text-sm">{m.issue}</p>
                    <p className="text-xs text-slate-400 mt-0.5">{m.type} · {m.date}</p>
                  </div>
                  <Badge status={m.status}/>
                </div>
                <p className="text-xs text-slate-500 mt-2">{m.description}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

const NotificationsPage = () => {
  const [notifs,setNotifs]=useState(NOTIFS);
  const markAll = () => setNotifs(v=>v.map(n=>({...n,read:true})));
  const unread = notifs.filter(n=>!n.read).length;
  const typeIcon = t=>({success:"check",info:"info",warning:"alert"}[t]||"bell");
  const typeBg = t=>({success:"bg-green-50 text-green-600",info:"bg-blue-50 text-blue-600",warning:"bg-amber-50 text-amber-600"}[t]||"bg-slate-50 text-slate-600");
  return (
    <div>
      <PageHeader title="Notifications" subtitle={`${unread} unread`}
        action={unread>0&&<button className="btn-secondary btn-sm" onClick={markAll}>Mark all read</button>}/>
      <div className="max-w-2xl space-y-3">
        {notifs.map(n=>(
          <div key={n.id} className={`card p-4 flex gap-4 ${!n.read?"ring-2 ring-teal-100":""}`}>
            <div className={`w-9 h-9 rounded-xl flex items-center justify-center shrink-0 ${typeBg(n.type)}`}>
              <I name={typeIcon(n.type)} size={17}/>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between mb-0.5">
                <p className={`text-sm font-600 ${!n.read?"text-slate-800":"text-slate-600"}`}>{n.title}</p>
                {!n.read&&<span className="w-2 h-2 bg-teal-500 rounded-full shrink-0"/>}
              </div>
              <p className="text-sm text-slate-500 leading-relaxed">{n.message}</p>
              <p className="text-xs text-slate-400 mt-1.5">{n.time}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

      <div className="card p-5">
        <h3 className="font-display font-600 text-slate-700 mb-4">High-Risk Areas</h3>

          {[{area:"Sta. Cruz, Naga City",risk:"Flooding",count:123},{area:"P. Santos",risk:"Power Outage",count:98},{area:"Magnolia Street",risk:"Fallen Wires",count:15}].map((z,i)=>(

        <button onClick={()=>navigate("a-reg")} className="text-teal-600 text-sm font-600 hover:underline">View all →</button>
      </div>
      <Table headers={["Student","Course","Dorm","Address","Status"]}
        rows={STUDENTS.slice(0,4).map(s=>[
          <div><p className="font-500 text-slate-700">{s.name}</p><p className="text-xs text-slate-400">{s.email}</p></div>,
          `${s.course}, Yr ${s.year}`, s.dorm, s.address, <Badge status={s.paymentStatus}/>
        ])}/>

  </div>
);

const StudentRegistryPage = ({ navigate, setSelectedStudent }) => {
  const [search,setSearch]=useState("");
  const filtered=STUDENTS.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||s.email.toLowerCase().includes(search.toLowerCase())||s.dorm.toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <PageHeader title="Student Registry" subtitle={`${filtered.length} verified off-campus students`}/>
      <div className="card p-5">
        <div className="relative mb-4">
          <I name="search" size={17} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, email, or dorm…" className="input pl-10"/>
        </div>
        <Table headers={["Student","Course & Year","Dorm & Room","Home Address","Action"]}
          rows={filtered.map(s=>[
            <div><p className="font-500 text-slate-700">{s.name}</p><p className="text-xs text-slate-400">{s.email}</p></div>,
            <div><p className="text-sm">{s.course}</p><p className="text-xs text-slate-400">Year {s.year}</p></div>,
            <div><p className="text-sm font-500">{s.dorm}</p><p className="text-xs text-slate-400">Room {s.room}</p></div>,
            s.address,
            <button className="btn-primary btn-sm flex items-center gap-1" onClick={()=>{setSelectedStudent(s);navigate("a-emergency");}}>
              <I name="eye" size={13}/>View
            </button>
          ])}/>
      </div>
    </div>
  );
};

/* ===== APP ===== */
function App() {
  const [page, setPage] = useState("landing");
  const [role, setRole] = useState(null);
  const [user, setUser] = useState(null);
  const [selectedDorm, setSelectedDorm] = useState(null);
  const [selectedStudent, setSelectedStudent] = useState(null);

  const navigate = (pg, data={}) => {
    if (data.role) setRole(data.role);
    setPage(pg);
    window.scrollTo(0,0);
  };

  const handleSignIn = (userData, pg, r) => {
    setUser(userData);
    setRole(r);
    setPage(pg);
  };

  const handleLogout = () => {
    setUser(null); setRole(null); setPage("landing");
  };

  // Public pages
  if (page==="landing") return <LandingPage navigate={navigate}/>;
  if (page==="signin") return <SignInPage navigate={(pg,data={})=>{
    if(pg==="s-dash"||pg==="c-dash"||pg==="o-dash"||pg==="a-dash"){
      setUser(data); setRole(data?.role||(pg==="s-dash"?"student":pg==="c-dash"?"caretaker":pg==="o-dash"?"owner":"admin"));
    }
    navigate(pg,data);
  }} setUser={setUser} preRole={null}/>;
  if (page==="register") return <RegisterPage navigate={navigate}/>;

  // Determine which dashboard layout to use
  const notifCount = 2;

  // Student pages
  if (role==="student") {
    const sPages = {
      "s-dash":<StudentDashboard navigate={navigate}/>,
      "s-search":<DormSearchPage navigate={navigate} setSelectedDorm={setSelectedDorm}/>,
      "s-detail":<DormDetailPage navigate={navigate} dorm={selectedDorm}/>,
      "s-pay":<StudentPaymentsPage/>,
      "s-maint":<StudentMaintenancePage/>,
      "s-notif":<NotificationsPage/>,
    };
    return (
      <DashboardLayout role="student" activePage={page} navigate={navigate} user={user||{name:"Sandra Fresnido"}} onLogout={handleLogout} notifCount={notifCount}>
        <div className="page-enter">{sPages[page]||sPages["s-dash"]}</div>
      </DashboardLayout>
    );
  }

  // Caretaker pages
  if (role==="caretaker") {
    const cPages = {
      "c-dash":<CaretakerDashboard navigate={navigate}/>,
      "c-dormers":<DormerManagementPage/>,
      "c-apps":<ApplicationReviewPage/>,
      "c-pay":<PaymentRecordingPage/>,
      "c-maint":<MaintenanceManagementPage/>,
      "c-parcel":<ParcelLoggingPage/>,
    };
    return (
      <DashboardLayout role="caretaker" activePage={page} navigate={navigate} user={user||{name:"Jungwon Yang"}} onLogout={handleLogout} notifCount={1}>
        <div className="page-enter">{cPages[page]||cPages["c-dash"]}</div>
      </DashboardLayout>
    );
  }

  // Owner pages
  if (role==="owner") {
    const oPages = {
      "o-dash":<OwnerDashboard/>,
      "o-dorms":<DormListingsPage navigate={navigate} setSelectedDorm={setSelectedDorm}/>,
      "o-add":<AddEditDormPage navigate={navigate} dorm={selectedDorm}/>,
      "o-pay":<OwnerPaymentRecordsPage/>,
      "o-log":<CaretakerActivityLogPage/>,
    };
    return (
      <DashboardLayout role="owner" activePage={["o-add"].includes(page)?"o-dorms":page} navigate={navigate} user={user||{name:"Ricardo Lim"}} onLogout={handleLogout} notifCount={0}>
        <div className="page-enter">{oPages[page]||oPages["o-dash"]}</div>
      </DashboardLayout>
    );
  }

  // Admin pages
  if (role==="admin") {
    const aPages = {
      "a-dash":<AdminDashboard navigate={navigate}/>,
      "a-reg":<StudentRegistryPage navigate={navigate} setSelectedStudent={setSelectedStudent}/>,
      "a-alerts":<AdminAlertsPage/>,
      "a-emergency":<StudentEmergencyDetailPage navigate={navigate} student={selectedStudent}/>,
    };
    return (
      <DashboardLayout role="admin" activePage={["a-emergency"].includes(page)?"a-reg":page} navigate={navigate} user={user||{name:"Dr. Ana Cruz"}} onLogout={handleLogout} notifCount={ALERTS.length}>
        <div className="page-enter">{aPages[page]||aPages["a-dash"]}</div>
      </DashboardLayout>
    );
  }

  // Fallback
  return <LandingPage navigate={navigate}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
